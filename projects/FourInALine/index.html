<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Four in a Line</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Four in a Line</h1>
    <div id="scoreboard">
        <div class="score-item">
            <span class="label">Player 1 (Red):</span>
            <span id="p1-score">0</span>
        </div>
        <div class="score-item">
            <span class="label">Player 2 (Yellow):</span>
            <span id="p2-score">0</span>
        </div>
        <button id="reset-scores" onclick="resetScoreboard()">Reset Scores</button>
    </div>
    <div class="toggle-container">
        <span class="toggle-label">Play vs Computer</span>
        <label class="switch">
            <input type="checkbox" id="vs-computer-toggle">
            <span class="slider"></span>
        </label>
    </div>
    <h2 id="status">Player 1's Turn (Red)</h2>
    <div id="board"></div>
    <button onclick="resetGame()">Reset Game</button>

    <script src="script.js"></script>
</body>
</html>
