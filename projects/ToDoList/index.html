<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro ToDoList</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button id="theme-toggle" class="theme-btn" title="Toggle Dark/Light Mode">
        <i class="fas fa-moon"></i>
    </button>

    <div class="todo-container">
        
        <div class="header-panel">
            <h2>Pro ToDoList</h2>
            <div class="stats-progress-block">
                <div class="stats-text">
                    <span id="task-count"></span>
                    <span id="percent-text"></span>
                </div>
                <div class="progress-bar">
                    <div id="progress-fill"></div>
                </div>
            </div>
        </div>

        <div class="input-section">
            <input type="text" id="todo-input" placeholder="What needs to be done?">
            <div class="input-details">
                <input type="date" id="todo-date">
                <select id="todo-priority">
                    <option value="Low">Low</option>
                    <option value="Medium" selected>Medium</option>
                    <option value="High">High</option>
                </select>
                <button id="add-btn">Add Task</button>
            </div>
        </div>

        <div class="controls-panel">
            <div class="search-block">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="search-input" placeholder="Search your tasks...">
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Done</button>
            </div>
        </div>

        <ul id="todo-list">
            </ul>

        <div id="empty-state" class="hidden">
            <i class="fas fa-check-circle"></i>
            <p>🎉 All caught up! Enjoy your day.</p>
        </div>

        <button id="clear-completed" class="danger-btn">Clear Completed Tasks</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
